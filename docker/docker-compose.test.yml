services:
  db:
    image: postgres:16-alpine
    container_name: tournament_db_test
    environment:
      POSTGRES_DB: tournament_test
      POSTGRES_USER: tournament_test_user
      POSTGRES_PASSWORD: tournament_test_password
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tournament_test_user -d tournament_test']
      interval: 2s
      timeout: 3s
      retries: 15
